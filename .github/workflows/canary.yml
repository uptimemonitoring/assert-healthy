name: Canary

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  up-monitor-passes:
    name: assert-healthy on a known-up monitor → expect pass
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outcome }}
    steps:
      - uses: actions/checkout@v4
      - id: run
        uses: ./
        with:
          api-key: ${{ secrets.UMK_LIVE_TEST_KEY }}
          monitor-ids: ${{ vars.CANARY_MONITOR_UP_ID }}

  down-monitor-fails:
    name: assert-healthy on a known-down monitor → expect fail
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outcome }}
    steps:
      - uses: actions/checkout@v4
      - id: run
        uses: ./
        with:
          api-key: ${{ secrets.UMK_LIVE_TEST_KEY }}
          monitor-ids: ${{ vars.CANARY_MONITOR_DOWN_ID }}
        continue-on-error: true
      - name: Verify the action correctly identified the monitor as down
        env:
          OUTCOME: ${{ steps.run.outcome }}
          UNHEALTHY_COUNT: ${{ steps.run.outputs.unhealthy-count }}
          UNHEALTHY_IDS: ${{ steps.run.outputs.unhealthy-ids }}
          EXPECTED_ID: ${{ vars.CANARY_MONITOR_DOWN_ID }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::Expected the action to fail on the known-down monitor, got outcome=$OUTCOME"
            exit 1
          fi
          if [ "$UNHEALTHY_COUNT" != "1" ]; then
            echo "::error::Expected unhealthy-count=1, got '$UNHEALTHY_COUNT'. The action may have failed for a reason other than the monitor being down (auth, network, schema)."
            exit 1
          fi
          if [ "$UNHEALTHY_IDS" != "$EXPECTED_ID" ]; then
            echo "::error::Expected unhealthy-ids=$EXPECTED_ID, got '$UNHEALTHY_IDS'."
            exit 1
          fi

  notify-on-mismatch:
    name: File a canary issue if any job mismatched
    runs-on: ubuntu-latest
    if: failure()
    needs: [up-monitor-passes, down-monitor-fails]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Canary mismatch on ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'The weekly canary workflow detected a mismatch.',
              '',
              `- Up monitor job: \`${{ needs.up-monitor-passes.result }}\``,
              `- Down monitor job: \`${{ needs.down-monitor-fails.result }}\``,
              '',
              `Run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['canary'],
            });
