name: Release

on:
  push:
    tags:
      - 'v+([0-9]).+([0-9]).+([0-9])'

permissions:
  contents: write

jobs:
  release:
    name: Cut release and update major-version ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist is in sync
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of sync with src/ at this tag. Re-tag after running 'npm run build' and committing."
            exit 1
          fi

      - name: Compute major version ref
        id: major
        run: |
          tag="${GITHUB_REF_NAME}"
          major="${tag%%.*}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.major.outputs.tag }}
          generate_release_notes: true

      - name: Force-move major-version ref
        env:
          MAJOR: ${{ steps.major.outputs.major }}
          TAG: ${{ steps.major.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" "$TAG" -m "Update $MAJOR to $TAG"
          git push origin "$MAJOR" --force
