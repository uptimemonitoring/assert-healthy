name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: lint • typecheck • test • build • dist-sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dist-in-sync guard
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of sync with src/. Run 'npm run build' and commit the result."
            git status --porcelain dist
            git --no-pager diff dist
            exit 1
          fi
